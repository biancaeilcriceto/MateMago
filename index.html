<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MateMago">
<meta name="theme-color" content="#6C3FC5">
<title>MateMago 🧙‍♂️</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a0533;
    --card: #2d1057;
    --purple: #6C3FC5;
    --pink: #FF5FA0;
    --yellow: #FFD84D;
    --cyan: #4DDEFF;
    --green: #4DFF9E;
    --red: #FF5252;
    --white: #fff;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  html, body {
    height: 100%;
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--white);
    overflow: hidden;
    touch-action: manipulation;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    background: radial-gradient(ellipse at top, #3a0d6e 0%, #1a0533 60%);
    position: relative;
  }

  /* Stars */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  .screen {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 24px 20px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: fadeIn 0.4s ease;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* HOME */
  .logo {
    font-size: 64px;
    filter: drop-shadow(0 0 20px rgba(255,216,77,0.8));
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .title {
    font-size: 52px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--yellow), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    text-align: center;
    line-height: 1;
  }

  .subtitle {
    font-size: 16px;
    color: rgba(255,255,255,0.6);
    text-align: center;
    font-weight: 700;
  }

  /* DIFFICULTY BUTTONS */
  .diff-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }

  .diff-btn {
    border: none;
    border-radius: 20px;
    padding: 18px 24px;
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: var(--shadow);
  }
  .diff-btn:active { transform: scale(0.96); }
  .diff-btn .emoji { font-size: 28px; }
  .diff-btn .info { text-align: left; }
  .diff-btn .info small { display: block; font-size: 12px; opacity: 0.75; font-weight: 700; }

  .easy   { background: linear-gradient(135deg, #4DFF9E, #00c97a); color: #003d25; }
  .medium { background: linear-gradient(135deg, #FFD84D, #ff9f00); color: #3d2a00; }
  .hard   { background: linear-gradient(135deg, #FF5FA0, #c4006e); color: #fff; }

  /* GAME */
  .hud {
    display: flex;
    justify-content: space-between;
    width: 100%;
    align-items: center;
  }
  .hud-box {
    background: var(--card);
    border-radius: 14px;
    padding: 10px 16px;
    text-align: center;
    box-shadow: var(--shadow);
    border: 2px solid rgba(255,255,255,0.08);
  }
  .hud-box .val {
    font-size: 24px;
    font-weight: 900;
    color: var(--yellow);
  }
  .hud-box .lbl {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.6;
    font-weight: 700;
  }

  /* Timer ring */
  .timer-wrap {
    position: relative;
    width: 64px;
    height: 64px;
  }
  .timer-wrap svg {
    position: absolute;
    inset: 0;
    transform: rotate(-90deg);
  }
  .timer-track { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 5; }
  .timer-ring  { fill: none; stroke: var(--cyan); stroke-width: 5;
    stroke-linecap: round;
    stroke-dasharray: 170;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }
  .timer-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 900;
    color: var(--cyan);
  }

  /* Question card */
  .question-card {
    background: var(--card);
    border-radius: 28px;
    padding: 32px 24px;
    width: 100%;
    text-align: center;
    box-shadow: var(--shadow);
    border: 2px solid rgba(255,255,255,0.08);
    position: relative;
    overflow: hidden;
  }
  .question-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 20% 20%, rgba(108,63,197,0.3), transparent 60%);
    pointer-events: none;
  }
  .op-badge {
    display: inline-block;
    background: var(--purple);
    border-radius: 50px;
    padding: 4px 14px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 16px;
    color: rgba(255,255,255,0.8);
  }
  .question-text {
    font-size: 52px;
    font-weight: 900;
    line-height: 1.1;
    color: var(--white);
  }
  .question-text .op {
    color: var(--yellow);
    font-size: 42px;
  }
  .question-text .eq {
    color: rgba(255,255,255,0.4);
  }
  .question-text .blank {
    color: var(--cyan);
    border-bottom: 4px solid var(--cyan);
    display: inline-block;
    min-width: 60px;
  }

  /* Answer grid */
  .answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
  }
  .ans-btn {
    background: var(--card);
    border: 3px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 22px 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 30px;
    font-weight: 900;
    color: var(--white);
    cursor: pointer;
    transition: transform 0.12s, border-color 0.12s, background 0.12s;
    box-shadow: var(--shadow);
  }
  .ans-btn:active { transform: scale(0.94); }
  .ans-btn.correct {
    background: linear-gradient(135deg, #4DFF9E, #00c97a);
    border-color: #4DFF9E;
    color: #003d25;
    animation: pop 0.3s ease;
  }
  .ans-btn.wrong {
    background: linear-gradient(135deg, #FF5252, #c40000);
    border-color: #FF5252;
    animation: shake 0.4s ease;
  }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    height: 8px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--pink));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* RESULT */
  .big-emoji {
    font-size: 80px;
    animation: bounce 0.6s ease;
  }
  @keyframes bounce {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .result-title {
    font-size: 36px;
    font-weight: 900;
    text-align: center;
    background: linear-gradient(135deg, var(--yellow), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .score-display {
    background: var(--card);
    border-radius: 24px;
    padding: 24px 40px;
    text-align: center;
    box-shadow: var(--shadow);
    border: 2px solid rgba(255,255,255,0.08);
    width: 100%;
  }
  .score-display .big-num {
    font-size: 64px;
    font-weight: 900;
    color: var(--yellow);
    line-height: 1;
  }
  .score-display .score-lbl {
    font-size: 14px;
    opacity: 0.6;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .stars-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    font-size: 36px;
  }
  .stat-row {
    display: flex;
    gap: 12px;
    width: 100%;
  }
  .stat-box {
    flex: 1;
    background: var(--card);
    border-radius: 16px;
    padding: 14px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-box .sv { font-size: 22px; font-weight: 900; }
  .stat-box .sl { font-size: 11px; opacity: 0.55; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Floating particles */
  .particle {
    position: fixed;
    pointer-events: none;
    font-size: 24px;
    animation: floatUp 1s ease-out forwards;
    z-index: 100;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
  }

  /* BTN */
  .btn-main {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    border: none;
    border-radius: 99px;
    padding: 18px 40px;
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: white;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(108,63,197,0.5);
    transition: transform 0.15s, box-shadow 0.15s;
    width: 100%;
    letter-spacing: 0.5px;
  }
  .btn-main:active { transform: scale(0.96); box-shadow: 0 4px 12px rgba(108,63,197,0.4); }

  .btn-ghost {
    background: transparent;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 99px;
    padding: 14px 32px;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    width: 100%;
  }
  .btn-ghost:active { border-color: var(--pink); color: var(--pink); }
</style>
</head>
<body>

<!-- Stars background -->
<div class="stars" id="stars"></div>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="logo">🧙‍♂️</div>
  <div>
    <div class="title">MateMago</div>
    <div class="subtitle">⭐ Il gioco magico della matematica ⭐</div>
  </div>
  <div class="diff-grid">
    <button class="diff-btn easy" onclick="startGame('easy')">
      <span class="emoji">🐣</span>
      <div class="info">Principiante <small>Numeri fino a 20 • Solo + e −</small></div>
    </button>
    <button class="diff-btn medium" onclick="startGame('medium')">
      <span class="emoji">🚀</span>
      <div class="info">Avventuriero <small>Numeri fino a 50 • +, − e ×</small></div>
    </button>
    <button class="diff-btn hard" onclick="startGame('hard')">
      <span class="emoji">🔥</span>
      <div class="info">Campione <small>Numeri fino a 100 • Tutte le operazioni</small></div>
    </button>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="screen-game">
  <div class="hud">
    <div class="hud-box">
      <div class="val" id="hud-score">0</div>
      <div class="lbl">⭐ Punti</div>
    </div>
    <div class="timer-wrap">
      <svg viewBox="0 0 60 60">
        <circle class="timer-track" cx="30" cy="30" r="27"/>
        <circle class="timer-ring" id="timer-ring" cx="30" cy="30" r="27"/>
      </svg>
      <div class="timer-num" id="timer-num">15</div>
    </div>
    <div class="hud-box">
      <div class="val" id="hud-streak">0🔥</div>
      <div class="lbl">Serie</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>

  <div class="question-card">
    <div class="op-badge" id="op-label">Addizione</div>
    <div class="question-text" id="question-text"></div>
  </div>

  <div class="answers" id="answers"></div>
</div>

<!-- RESULT -->
<div class="screen" id="screen-result">
  <div class="big-emoji" id="result-emoji">🎉</div>
  <div class="result-title" id="result-title">Fantastico!</div>
  <div class="stars-row" id="stars-row"></div>
  <div class="score-display">
    <div class="big-num" id="final-score">0</div>
    <div class="score-lbl">Punti totali</div>
  </div>
  <div class="stat-row">
    <div class="stat-box">
      <div class="sv" id="stat-correct" style="color:#4DFF9E">0</div>
      <div class="sl">✅ Corrette</div>
    </div>
    <div class="stat-box">
      <div class="sv" id="stat-wrong" style="color:#FF5252">0</div>
      <div class="sl">❌ Errori</div>
    </div>
    <div class="stat-box">
      <div class="sv" id="stat-best" style="color:#FFD84D">0🔥</div>
      <div class="sl">Serie max</div>
    </div>
  </div>
  <button class="btn-main" onclick="startGame(currentDiff)">🔄 Gioca ancora</button>
  <button class="btn-ghost" onclick="showHome()">🏠 Menu</button>
</div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
    starsEl.appendChild(s);
  }

  // Config
  const TOTAL_QUESTIONS = 10;
  const TIMER_SECONDS = { easy: 15, medium: 12, hard: 10 };
  const SCORE_BASE = { easy: 10, medium: 15, hard: 20 };
  const OP_LABELS = { '+': 'Addizione ➕', '-': 'Sottrazione ➖', '*': 'Moltiplicazione ✖️', '/': 'Divisione ➗' };

  let currentDiff, questions, currentQ, score, streak, bestStreak, correct, wrong, timer, timerInterval;
  let answered = false;

  function genQuestion(diff) {
    const ops = { easy: ['+','-'], medium: ['+','-','*'], hard: ['+','-','*','/'] };
    const maxN = { easy: 20, medium: 50, hard: 100 };
    const op = ops[diff][Math.floor(Math.random() * ops[diff].length)];
    let a, b, ans;
    const max = maxN[diff];

    if (op === '+') {
      a = Math.floor(Math.random() * max) + 1;
      b = Math.floor(Math.random() * max) + 1;
      ans = a + b;
    } else if (op === '-') {
      a = Math.floor(Math.random() * max) + 1;
      b = Math.floor(Math.random() * a) + 1;
      ans = a - b;
    } else if (op === '*') {
      const mmax = diff === 'hard' ? 12 : 10;
      a = Math.floor(Math.random() * mmax) + 1;
      b = Math.floor(Math.random() * mmax) + 1;
      ans = a * b;
    } else {
      b = Math.floor(Math.random() * 9) + 2;
      ans = Math.floor(Math.random() * 10) + 1;
      a = b * ans;
    }

    // Wrong answers
    const wrongs = new Set();
    while (wrongs.size < 3) {
      let offset = Math.floor(Math.random() * 8) + 1;
      if (Math.random() < 0.5) offset = -offset;
      const w = ans + offset;
      if (w !== ans && w >= 0 && !wrongs.has(w)) wrongs.add(w);
    }
    const choices = [...wrongs, ans].sort(() => Math.random() - 0.5);

    const opSym = op === '*' ? '×' : op === '/' ? '÷' : op;
    return { a, b, op, opSym, ans, choices, label: OP_LABELS[op] };
  }

  function startGame(diff) {
    currentDiff = diff;
    questions = Array.from({length: TOTAL_QUESTIONS}, () => genQuestion(diff));
    currentQ = 0; score = 0; streak = 0; bestStreak = 0; correct = 0; wrong = 0;
    showScreen('game');
    renderQuestion();
  }

  function renderQuestion() {
    if (currentQ >= TOTAL_QUESTIONS) { endGame(); return; }
    answered = false;
    const q = questions[currentQ];

    document.getElementById('hud-score').textContent = score;
    document.getElementById('hud-streak').textContent = streak + (streak >= 3 ? '🔥' : '');
    document.getElementById('op-label').textContent = q.label;
    document.getElementById('question-text').innerHTML =
      `<span>${q.a}</span> <span class="op">${q.opSym}</span> <span>${q.b}</span> <span class="eq">=</span> <span class="blank">?</span>`;
    document.getElementById('progress-bar').style.width = (currentQ / TOTAL_QUESTIONS * 100) + '%';

    const ans = document.getElementById('answers');
    ans.innerHTML = '';
    q.choices.forEach(ch => {
      const btn = document.createElement('button');
      btn.className = 'ans-btn';
      btn.textContent = ch;
      btn.onclick = () => checkAnswer(ch, q.ans, btn);
      ans.appendChild(btn);
    });

    startTimer();
  }

  function startTimer() {
    clearInterval(timerInterval);
    const secs = TIMER_SECONDS[currentDiff];
    let remaining = secs;
    const ring = document.getElementById('timer-ring');
    const numEl = document.getElementById('timer-num');
    const circ = 2 * Math.PI * 27;

    ring.style.stroke = 'var(--cyan)';
    ring.style.strokeDashoffset = 0;
    numEl.style.color = 'var(--cyan)';
    numEl.textContent = remaining;

    timerInterval = setInterval(() => {
      remaining--;
      numEl.textContent = remaining;
      ring.style.strokeDashoffset = circ * (1 - remaining / secs);
      if (remaining <= 3) { ring.style.stroke = 'var(--red)'; numEl.style.color = 'var(--red)'; }
      if (remaining <= 0) {
        clearInterval(timerInterval);
        if (!answered) timeOut();
      }
    }, 1000);
  }

  function timeOut() {
    answered = true;
    streak = 0;
    wrong++;
    document.getElementById('hud-streak').textContent = '0';
    // Mark correct answer green
    const q = questions[currentQ];
    document.querySelectorAll('.ans-btn').forEach(btn => {
      if (parseInt(btn.textContent) === q.ans) btn.classList.add('correct');
      btn.disabled = true;
    });
    spawnParticle('⏰', true);
    setTimeout(() => { currentQ++; renderQuestion(); }, 900);
  }

  function checkAnswer(chosen, correct_ans, btn) {
    if (answered) return;
    answered = true;
    clearInterval(timerInterval);

    if (chosen === correct_ans) {
      btn.classList.add('correct');
      streak++;
      if (streak > bestStreak) bestStreak = streak;
      const bonus = streak >= 3 ? Math.floor(SCORE_BASE[currentDiff] * 0.5) : 0;
      score += SCORE_BASE[currentDiff] + bonus;
      correct++;
      document.getElementById('hud-score').textContent = score;
      document.getElementById('hud-streak').textContent = streak + (streak >= 3 ? '🔥' : '');
      spawnParticle(streak >= 5 ? '🌟' : streak >= 3 ? '⭐' : '✨', false);
    } else {
      btn.classList.add('wrong');
      streak = 0;
      wrong++;
      document.getElementById('hud-streak').textContent = '0';
      // show correct
      document.querySelectorAll('.ans-btn').forEach(b => {
        if (parseInt(b.textContent) === correct_ans) b.classList.add('correct');
        b.disabled = true;
      });
      spawnParticle('💥', true);
    }

    setTimeout(() => { currentQ++; renderQuestion(); }, 800);
  }

  function endGame() {
    clearInterval(timerInterval);
    showScreen('result');
    document.getElementById('final-score').textContent = score;
    document.getElementById('stat-correct').textContent = correct;
    document.getElementById('stat-wrong').textContent = wrong;
    document.getElementById('stat-best').textContent = bestStreak + '🔥';

    const pct = correct / TOTAL_QUESTIONS;
    let emoji, title, stars;
    if (pct === 1)       { emoji = '🏆'; title = 'Sei un CAMPIONE!'; stars = '⭐⭐⭐'; }
    else if (pct >= 0.8) { emoji = '🎉'; title = 'Fantastico!'; stars = '⭐⭐⭐'; }
    else if (pct >= 0.6) { emoji = '😊'; title = 'Molto bene!'; stars = '⭐⭐'; }
    else if (pct >= 0.4) { emoji = '🙂'; title = 'Continua così!'; stars = '⭐'; }
    else                 { emoji = '💪'; title = 'Allenati ancora!'; stars = ''; }

    document.getElementById('result-emoji').textContent = emoji;
    document.getElementById('result-title').textContent = title;
    document.getElementById('stars-row').textContent = stars;
    document.getElementById('progress-bar').style.width = '100%';
  }

  function spawnParticle(symbol, bad) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = symbol;
    el.style.left = (30 + Math.random() * 40) + '%';
    el.style.top = (40 + Math.random() * 20) + '%';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }

  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
  }

  function showHome() { clearInterval(timerInterval); showScreen('home'); }
